name: CI — sdwc-web

on:
  pull_request:
    branches: [main]
    paths:
      - "sdwc-web/**"
  push:
    branches: [main]
    paths:
      - "sdwc-web/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdwc-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdwc-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  docker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: sdwc-web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/sdwc-web:sha-${{ env.SHORT_SHA }}
            ghcr.io/${{ env.REPO_LC }}/sdwc-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
